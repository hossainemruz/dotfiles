# AeroSpace macOS window manager config.
# Mirrors the Hyprland bindings in dot_config/hypr/bindings.conf.tmpl where possible.

config-version = 2
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Treat each workspace as a full-window stack; explicit floating rules still float.
accordion-padding = 0
default-root-container-layout = 'accordion'
default-root-container-orientation = 'horizontal'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
# Application bindings
cmd-alt-enter = 'exec-and-forget open -na Ghostty'

# Common bindings
cmd-enter = 'exec-and-forget open -na Ghostty'
cmd-shift-enter = 'exec-and-forget open -na Zen'
cmd-shift-f = 'exec-and-forget open -a Finder'
cmd-shift-b = 'exec-and-forget open -na Zen'
cmd-shift-alt-b = 'exec-and-forget open -na Zen --args --private-window'
cmd-shift-n = 'exec-and-forget open -a "Visual Studio Code"'
cmd-shift-o = 'exec-and-forget open -a Obsidian'
cmd-shift-slash = 'exec-and-forget open -a "Proton Pass"'

cmd-shift-s = 'exec-and-forget open -a Slack'
cmd-shift-e = 'exec-and-forget open -a "Proton Mail"'
cmd-shift-c = 'exec-and-forget open https://calendar.google.com'
cmd-shift-t = 'exec-and-forget open -a Todoist'
cmd-shift-y = 'exec-and-forget open https://youtube.com/'
cmd-shift-x = 'exec-and-forget open https://x.com/'

# Native replacements for Hyprland special workspaces.
cmd-alt-c = 'exec-and-forget open -a ChatGPT'
cmd-alt-g = 'exec-and-forget open https://grok.com/'
cmd-alt-h = 'exec-and-forget open -a Grammarly'
cmd-alt-j = 'exec-and-forget open https://gemini.google.com/app'
cmd-alt-m = 'exec-and-forget open -a "Proton Mail"'
cmd-alt-p = 'exec-and-forget open -a "Proton Pass"'
cmd-alt-t = 'exec-and-forget open -na Ghostty'

# Full-window stack navigation.
cmd-comma = 'focus --wrap-around dfs-prev'
cmd-period = 'focus --wrap-around dfs-next'
cmd-n = 'focus --wrap-around dfs-next'

# Workspace controls.
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

cmd-shift-1 = 'move-node-to-workspace 1'
cmd-shift-2 = 'move-node-to-workspace 2'
cmd-shift-3 = 'move-node-to-workspace 3'
cmd-shift-4 = 'move-node-to-workspace 4'
cmd-shift-5 = 'move-node-to-workspace 5'
cmd-shift-6 = 'move-node-to-workspace 6'
cmd-shift-7 = 'move-node-to-workspace 7'
cmd-shift-8 = 'move-node-to-workspace 8'
cmd-shift-9 = 'move-node-to-workspace 9'

# Floating escape hatch for small utility windows.
cmd-shift-space = 'layout floating tiling'
cmd-tab = 'workspace-back-and-forth'

[[on-window-detected]]
if.app-id = 'me.proton.pass.electron'
run = ['layout floating', 'move-mouse window-lazy-center']
