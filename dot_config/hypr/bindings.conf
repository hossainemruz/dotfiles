# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

# Common bindings
bindd = SUPER, RETURN, Terminal, exec, $terminal
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, M, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm-app -- obsidian"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password
bindd = ALT, B, Bluetooth, exec, $terminal --title="bluetui" -e bluetui

bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/" --profile-directory=Personal
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/" --profile-directory=Personal
bindd = SUPER SHIFT, S, Slack, exec, omarchy-launch-or-focus slack
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://mail.google.com" --profile-directory=Work
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com" --profile-directory=Work


# Special workspace related keybindings
bind = SUPER ALT, C, togglespecialworkspace, chatgpt
bind = SUPER ALT, A, togglespecialworkspace, easyeffects
bind = SUPER ALT, D, togglespecialworkspace, devtoolbox
bind = SUPER ALT, G, togglespecialworkspace, grok
bind = SUPER ALT, H, togglespecialworkspace, grammarly
bind = SUPER ALT, J, togglespecialworkspace, gemini
bind = SUPER ALT, K, togglespecialworkspace, k8s
bind = SUPER ALT, M, togglespecialworkspace, proton-mail
bind = SUPER ALT, N, togglespecialworkspace, scratchpad
bind = SUPER ALT, O, togglespecialworkspace, omarchy-cheat-sheet
bind = SUPER ALT, P, togglespecialworkspace, proton-pass
bind = SUPER ALT, T, togglespecialworkspace, termspace
bind = SUPER ALT, U, togglespecialworkspace, ai-usagebar
bind = SUPER ALT, V, togglespecialworkspace, neovim-cheat-sheet
bind = SUPER ALT, Y, togglespecialworkspace, yazi
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, Space
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# For master / monocle style cycling
bind = SUPER, J, layoutmsg, cyclenext
unbind = SUPER , K
bind = SUPER, K, layoutmsg, cycleprev

# Master layout binding
bind = SUPER, N, layoutmsg, swapnext

# Disable switching layout using keybindings
unbind = SUPER, L
# Disable changing display scale using keybindings
unbind = SUPER, code:61
unbind = SUPER ALT, code:61
